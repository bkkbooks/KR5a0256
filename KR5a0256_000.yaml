front:
  text: 太微靈書紫文琅玕華丹神眞上經果三先齋於山林之中四十日不交外事乃就作神泥比竟百日令泥釡竟也取耐燒土釡容三斗者白赤無所在唯令堪火不坼破者耳作神泥法東海左顧牡蠣六分蚡螻土三分馬脫落細毛一分滑石三分赤石脂三分羊細毛二分大鹽半分合七物合擣下細篩和以百日醶䤈更擣三萬杵若泥淖者更加赤石脂泥剛者更加䤈更擣取成細泥其篩治和泥朴唯令至精細當擇取牡蠣裏白不用外骨之皮也先澡擇馬羊毛又别末擇蚡螻土皆令精去麤穢也今所分者非作稱兩之分也謂用泥多少足以泥兩釡爲諸物合隱量之等分耳泥兩釡内外通令厚七分當以漸先簿泥隂乾令燥燥又增泥漸至七分也泥釡内外七分既畢燥之又以醶䤈和黄丹擣三萬杵令如泥泥兩釡内上下令厚三分坼更增泥又隂乾十日取令勿坼黄丹者鉛丹也勿以此泥泥外面納藥既畢當堅宻以泥精縫之塞其際㑹至令保宻又更泥泥外面上下及四邊令厚四分畢隂乾置盛處二十七日若外復細坼者更以羊鬚爲筆染泥泥之復乾七日乃可令外厚一寸四五分許乃佳於是作神泥泥釡及納藥之事都畢也此泥法既省約於金液九轉之釡但冶泥當便極細至精節適和擣用心有過於九轉之釡也謹宻勿令華精泄散泄散則無益又失功夫於齋盛以月建日更齋百日齋畢以清酒三斛投之於東流水中臨水祝曰太玄青流八海九江山神地祇上護丹精美酒三斛謹祠河靈畢還勿顧乃以其日納藥於釡中也又作丹欲得山林之中臨東流水上唯令人迹所不至雞犬之聲不聞於耳乃佳慎之琅玕華丹藥種物如左絳陵朱兒十斤口訣是丹砂丹山日魂五斤口訣是雄黄白素飛龍一斤口訣是白石英青腰中女五兩口訣是空青紫陵文侯五兩口訣是紫石英碧城飛華五兩口訣是石黛北帝玄珠一斤口訣是硝石九靈黄童五兩口訣是石硫黄五精金羊五兩口訣是陽起石心雨華飛英五兩口訣是雲母白虎脫齒五兩口訣是金牙石流丹白膏一斤口訣是胡粉倒行神骨五兩口訣是戎鹽玄臺月華五斤口訣是雌黄都合十四種以次别擣從丹砂始各擣五千杵又擣藥人當温慎無多口舌者當令先齋三十日然後使擣又合藥時止可將三四人耳盖其人難得如意若一人不同心便壞人事華丹既成一兩爲一僊劑若且欲居世俗之間聽服半兩别擣藥都畢以藥安著釡中先納戎鹽舒箸釜底次納硝石次納雲毋次納陽起石次納金牙石次納胡粉次納空青次納石硫黄次納白石英次納石黛次納紫石英次納雌黄次納雄黄次納丹砂丹砂獨在上十四種都畢皆當舒次令竟釡中小抑令相薄也又以水銀三斤灌諸藥之上都畢也又餘安上土釡以黄丹泥泥其平際以牡蠣泥泥其外際隂乾乃又通泥外面上下四邊令厚四分耳竈屋起基先鑿地去除穢土三尺更納好土築以滿之又更於平土之上起基髙令二尺五寸勿在故塜墓之處及故居家之墟間爲竈而止也竈屋令成巾長三丈廣一丈六尺髙一丈六尺潔盛治護以好草覆之泥壁内外令堅宻正東正南門二户户廣四尺暮閉之視火人及主人止室中以竈安屋下中央竈口令向東以好塼石繕作之以苦酒及東流水擣和細白土并牛馬麞鹿毛爲泥泥竈竈内安鐵𨭊以藥釜著𨭊上使釜在竈中央釡四邊當去竈土各三寸半令竈髙於釡上二尺釜下去地一尺八寸以好糠火於下燒之令去釡一尺許調適繕視火氣勿令暴猛足二十日更令火去釡下六寸又二十日日足更又令火去釡下四寸又二十日日足更又令火去釡下一寸十日日足又更令火親釡下又十日日足更又令火半釡復又二十日日足都合百日藥成也可復寒之三日而發之飛華皆輕著上釡以三歳雄雞羽掃之其華上當有三十七種之色飛流映鬱紫霞玄煥名曰琅玕華丹以十一月四月八月朔日平旦向王再拜以東流水服一兩即頭生七色之氣面有金華玉映閉氣則立致八玄之輿唾地則化爲飛龍左嘯則神僊立朝右指則三素合風千乗萬騎飛行上清若藥華未盡起者可更合泥兩際如前法使宻更燒釡腹頓四十九日無復不成也
