body:
  text: 黄水月華丹法火燒釜百日成琅玕華丹丹成勿發取又更始火如初燒華丹之狀進止火尺寸之法復百日合前二百日寒之六宿發而視之衆精仰於上釡結幕幕中有黄水水有黄華華似芙蓉名曰黄水月華幕仰著上釜如玄膽之狀掇而取之食其華而飲黄水一升則分形萬變眼爲明月浮遊太空飛行紫微上宫徊水玉精丹法火燒藥釡二百日變成黄水月華勿發又始更與火如前法復一百日合前三百日寒之九宿而發之衆精結苞仰著上釡苞中有白水如玉膏狀自徊動常左行流動於苞中白水中有明珠三枚貌大如雞子名曰徊水玉精其味有百和之甘香軟如飴取食一珠則與天相頓身生水火唾炁成玉化形爲日天帝下迎乗景上清穿地廣深七尺取琅玕華丹以和徊水如雞子者種之於塪復其土堅築之三年其上生樹赤色如棗髙三四尺其實如鐶名曰鐶剛樹食其實與天相生上升太極化形爲雲一名太極隱芝穿地廣深六尺取鐶實一枚種之灌以黄水五合復其土堅築之三年其上更生草如匏其子如桃有五色名曰鳳腦芝食其實上昇太極唾地化爲鳳凰可乗鳳而翔也一名太極隱芝穿地廣深一丈取黄水四合鳳腦實一枚合種之以黄水灌腦實腹其土堅築之三年上生赤樹如松髙五六尺其實如梨子正白如玉食其實上登太微唾地爲青玉穿地廣深八尺取赤樹子種之灌以徊水五合復其土堅築之三年上生絳樹似李髙六七尺生青實如棗色青如翠食其實上登紫微唾地化爲黄金得乗玄雲而行水陽青映液法取黄水徊水各一升五合合三升也更别於小鐡器中熬之七沸當變合成青水也名曰水陽青映平旦頓飲之則身有青玉之光口吐紫烟上昇上清唾地成丹砂八石以鐵器熬鉛一斤水銀二兩使極沸以琅玕華丹一銖投之食頃立成眞銀以鐵器熬鉛一斤水銀五兩使極沸以琅玕華丹三銖投之食頃立成紫金金銀成以百斤投東流水中各作一餅令重五十斤臨水呪曰天河織女地川水伯太丹成華僊魂錬魄長去地上昇爲帝客奉寳兩璧以鎮源澤祝畢徑還勿顧欲種神樹當在名山之隂爲塪離其四面勿使人獸之迹交行塪上也皇天上清後聖君自少學道所受施行祕要得爲金闕之帝者也五老上眞太極左僊公上啓撰集爲靈書紫文命付方諸東宫青童大君使下教刻録玄名當爲眞人者此太上之祕言後聖之紫文矣四極明科聖君之法聽七百年内得三傳而已若百年之内有二人可授者授之要以七百年内傳三人爲誓過限年滿皆不得復出傳授之時對齋七日而後奉付之焉上靈眞官玉女玉童各十人侍書衛文將監察得失剌言功過夫學僊者明慎其始矣法當立盟啓質爲不泄之約其傳聖君列紀行服精吞霞受開明隂生及天皇象符及拘魂制魄上經𧵥有經之師白絹四十尺銀鐶二雙素𢇁四兩以代㰱血之誓爲閉祕不宣之信其受琅玕華丹神眞上經法當𧵥有經之師金龍玉魚以代刻身石誓不漏之盟古之上皇皆保貴神書防其輕泄所以重𧵥玄誓期之勿泄示其篤誠明其根始也其不奉科條泄閉後聖紫文列紀者三祖父母生則獲罪於水火死則受考於三官身没爲下鬼削除僊簡槤北溟之石副之太山汲西津之水致之東海子其慎哉藥物皆用古稱唯今精上也青童君諱梵湄毎八節日存之王君曰金龍玉魚之誓俗希其物復不可閉經過期而不授也巳上啓以青布三十尺准盟青者精其心也布者布其誠也太微靈書紫文琅玕華丹神眞上經
